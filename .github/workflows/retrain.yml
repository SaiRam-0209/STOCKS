name: Nightly Model Retrain

on:
  schedule:
    # 5:30 PM UTC = 11:00 PM IST, Monday–Friday
    - cron: "30 17 * * 1-5"

  # Run manually from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      full_retrain:
        description: "Full history retrain (slow) vs 12-month rolling (fast)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  retrain:
    name: Retrain BreakoutRanker
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: write   # needed to commit model back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create cache and models directories
        run: mkdir -p cache models

      - name: Run retraining
        env:
          FULL_RETRAIN: ${{ github.event.inputs.full_retrain }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ "$FULL_RETRAIN" = "true" ]; then
            python scripts/retrain.py --full
          else
            python scripts/retrain.py
          fi

      - name: Check model was saved
        run: |
          echo "Models directory:"
          ls -lh models/
          if [ -z "$(ls models/*.joblib 2>/dev/null)" ]; then
            echo "ERROR: No model file found after training!"
            exit 1
          fi

      - name: Commit updated model
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Force-add model files even if listed in .gitignore
          git add -f models/*.joblib

          if git diff --cached --quiet; then
            echo "Model unchanged — nothing to commit."
          else
            git commit -m "chore: retrain BreakoutRanker $(date -u '+%Y-%m-%d')"
            git push
            echo "Model pushed to repo."
          fi
