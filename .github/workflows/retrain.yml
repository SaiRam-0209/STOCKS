name: Nightly Model Retrain

on:
  schedule:
    # 5:30 PM UTC = 11:00 PM IST, Monday–Friday
    - cron: "30 17 * * 1-5"

  workflow_dispatch:
    inputs:
      full_retrain:
        description: "Full history retrain (slow) vs 12-month rolling (fast)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  retrain:
    name: Retrain BreakoutRanker
    runs-on: ubuntu-latest
    timeout-minutes: 180

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create cache and models directories
        run: mkdir -p cache models

      # Restore checkpoint from previous run (if any) so we skip re-fetching
      - name: Restore checkpoint artifact
        uses: actions/download-artifact@v4
        with:
          name: training-checkpoint
          path: models/
        continue-on-error: true   # no artifact on first run — that's fine

      - name: Run retraining
        env:
          FULL_RETRAIN: ${{ github.event.inputs.full_retrain }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ "$FULL_RETRAIN" = "true" ]; then
            python scripts/retrain.py --full
          else
            python scripts/retrain.py
          fi

      # If training failed mid-way, save checkpoint so the next run resumes
      - name: Upload checkpoint on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: training-checkpoint
          path: models/checkpoint_*.joblib
          retention-days: 3
          if-no-files-found: ignore

      - name: Check model was saved
        run: |
          echo "Models directory:"
          ls -lh models/
          if [ -z "$(ls models/*.joblib 2>/dev/null)" ]; then
            echo "ERROR: No model file found after training!"
            exit 1
          fi

      - name: Pull latest (preserve WinClassifierV2 from GCP retrain)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase

      - name: Commit BreakoutRanker only
        run: |
          git add -f models/breakout_ranker_all_nse.joblib

          if git diff --cached --quiet; then
            echo "Model unchanged — nothing to commit."
          else
            git commit -m "chore: retrain BreakoutRanker $(date -u '+%Y-%m-%d')"
            git push
            echo "BreakoutRanker pushed to repo."
          fi

      # Clean up checkpoint artifact after successful training
      - name: Delete checkpoint artifact on success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh artifact delete training-checkpoint --repo "$GITHUB_REPOSITORY" || true
