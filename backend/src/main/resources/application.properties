# ============================================================
# Application Configuration
# ============================================================
spring.application.name=ticket-support-portal
server.port=8080
server.servlet.context-path=/api

# ============================================================
# Database Configuration
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/ticket_support_portal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# JWT Configuration
# ============================================================
jwt.secret=your-super-secret-jwt-key-minimum-256-bits-change-in-production-please
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ============================================================
# Email Configuration (SMTP)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# From email display name
app.email.from=support@ticketportal.com
app.email.from-name=AI Support Portal

# ============================================================
# File Upload Configuration
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.directory=./uploads
app.upload.allowed-types=pdf,doc,docx,txt,png,jpg,jpeg,gif,zip,xlsx,csv

# ============================================================
# AI Service Configuration
# ============================================================
# Replace with your actual AI API key and endpoint
ai.api.key=INCLUDE_YOUR_AI_API_KEY_HERE
ai.api.url=https://api.anthropic.com/v1/messages
ai.model=claude-3-sonnet-20240229
ai.max-tokens=1024
ai.enabled=true

# ============================================================
# Application URLs
# ============================================================
app.frontend.url=http://localhost:4200
app.backend.url=http://localhost:8080/api

# ============================================================
# Logging
# ============================================================
logging.level.com.supportportal=INFO
logging.level.org.springframework.security=WARN
logging.file.name=logs/application.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# CORS Configuration
# ============================================================
app.cors.allowed-origins=http://localhost:4200

# ============================================================
# Pagination Defaults
# ============================================================
app.pagination.default-page-size=10
app.pagination.max-page-size=100
