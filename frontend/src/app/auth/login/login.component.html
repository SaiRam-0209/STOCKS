<div class="auth-page">
  <div class="auth-card fade-in">
    <!-- Header -->
    <div class="auth-header">
      <div class="auth-header__icon">🎫</div>
      <div class="auth-header__title">Welcome Back</div>
      <div class="auth-header__subtitle">Sign in to AI Support Portal</div>
    </div>

    <!-- Body -->
    <div class="auth-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <!-- Email -->
        <mat-form-field appearance="outline" class="full-width" style="margin-bottom:16px;">
          <mat-label>Email Address</mat-label>
          <input matInput type="email" formControlName="email"
                 placeholder="you@example.com" autocomplete="email">
          <mat-icon matPrefix style="margin-right:8px; color:#9e9e9e;">email</mat-icon>
          <mat-error>{{ getEmailError() }}</mat-error>
        </mat-form-field>

        <!-- Password -->
        <mat-form-field appearance="outline" class="full-width" style="margin-bottom:8px;">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'"
                 formControlName="password" autocomplete="current-password">
          <mat-icon matPrefix style="margin-right:8px; color:#9e9e9e;">lock</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error>{{ getPasswordError() }}</mat-error>
        </mat-form-field>

        <!-- Forgot Password -->
        <div style="text-align:right; margin-bottom:24px;">
          <a routerLink="/auth/forgot-password"
             style="font-size:13px; color:#3949ab; text-decoration:none; font-weight:500;">
            Forgot your password?
          </a>
        </div>

        <!-- Submit -->
        <button mat-raised-button color="primary" type="submit"
                [disabled]="loading"
                style="width:100%; height:48px; font-size:15px; font-weight:600; border-radius:10px;">
          <mat-spinner *ngIf="loading" diameter="22" style="display:inline-block; margin-right:8px;"></mat-spinner>
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <!-- Register Link -->
      <div style="text-align:center; margin-top:24px; font-size:14px; color:#616161;">
        Don't have an account?
        <a routerLink="/auth/register"
           style="color:#3949ab; font-weight:600; text-decoration:none; margin-left:4px;">
          Create one here
        </a>
      </div>

      <!-- Demo Credentials -->
      <div style="margin-top:20px; padding:14px; background:#f8f9ff; border-radius:10px;
                  border:1px solid #e8eaf6; font-size:12px; color:#616161;">
        <div style="font-weight:600; color:#3949ab; margin-bottom:6px;">🔑 Demo Credentials</div>
        <div>Admin: <strong>admin@supportportal.com</strong> / <strong>Admin@123</strong></div>
      </div>
    </div>
  </div>
</div>
