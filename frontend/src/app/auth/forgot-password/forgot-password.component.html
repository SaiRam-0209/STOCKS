<div class="auth-page">
  <div class="auth-card fade-in" style="max-width:440px;">
    <div class="auth-header" style="background:linear-gradient(135deg,#e91e63,#880e4f);">
      <div class="auth-header__icon">🔐</div>
      <div class="auth-header__title">Forgot Password</div>
      <div class="auth-header__subtitle">Enter your email to receive a reset link</div>
    </div>
    <div class="auth-body">
      <div *ngIf="!sent">
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline" class="full-width" style="margin-bottom:20px;">
            <mat-label>Email Address</mat-label>
            <input matInput type="email" formControlName="email" placeholder="you@example.com">
            <mat-icon matPrefix style="margin-right:8px; color:#9e9e9e;">email</mat-icon>
            <mat-error *ngIf="form.get('email')?.hasError('required')">Email is required</mat-error>
            <mat-error *ngIf="form.get('email')?.hasError('email')">Please enter a valid email</mat-error>
          </mat-form-field>
          <button mat-raised-button type="submit" [disabled]="loading"
                  style="width:100%; height:48px; background:#e91e63; color:white; border-radius:10px; font-weight:600;">
            <mat-spinner *ngIf="loading" diameter="20" style="display:inline-block; margin-right:8px;"></mat-spinner>
            {{ loading ? 'Sending...' : 'Send Reset Link' }}
          </button>
        </form>
      </div>
      <div *ngIf="sent" style="text-align:center; padding:20px 0;">
        <div style="font-size:56px; margin-bottom:16px;">📧</div>
        <h3 style="color:#3949ab; margin-bottom:8px;">Check your inbox!</h3>
        <p style="color:#616161;">A password reset link has been sent to your email. It expires in 1 hour.</p>
      </div>
      <div style="text-align:center; margin-top:20px; font-size:14px; color:#616161;">
        <a routerLink="/auth/login" style="color:#3949ab; font-weight:600; text-decoration:none;">
          ← Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
