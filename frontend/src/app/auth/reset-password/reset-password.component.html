<div class="auth-page">
  <div class="auth-card fade-in" style="max-width:440px;">
    <div class="auth-header" style="background:linear-gradient(135deg,#4caf50,#1b5e20);">
      <div class="auth-header__icon">🔒</div>
      <div class="auth-header__title">Reset Password</div>
      <div class="auth-header__subtitle">Create a new secure password</div>
    </div>
    <div class="auth-body">
      <div *ngIf="!success">
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline" class="full-width" style="margin-bottom:12px;">
            <mat-label>New Password</mat-label>
            <input matInput [type]="hidePass ? 'password' : 'text'" formControlName="newPassword">
            <mat-icon matPrefix style="margin-right:8px; color:#9e9e9e;">lock</mat-icon>
            <button mat-icon-button matSuffix type="button" (click)="hidePass = !hidePass">
              <mat-icon>{{ hidePass ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="form.get('newPassword')?.hasError('required')">Password is required</mat-error>
            <mat-error *ngIf="form.get('newPassword')?.hasError('pattern')">
              Must contain uppercase, lowercase, number, and special character
            </mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline" class="full-width" style="margin-bottom:20px;">
            <mat-label>Confirm New Password</mat-label>
            <input matInput [type]="hideConf ? 'password' : 'text'" formControlName="confirmPassword">
            <mat-icon matPrefix style="margin-right:8px; color:#9e9e9e;">lock_outline</mat-icon>
            <button mat-icon-button matSuffix type="button" (click)="hideConf = !hideConf">
              <mat-icon>{{ hideConf ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="form.get('confirmPassword')?.hasError('passwordMismatch')">Passwords do not match</mat-error>
          </mat-form-field>
          <button mat-raised-button type="submit" [disabled]="loading"
                  style="width:100%; height:48px; background:#4caf50; color:white; border-radius:10px; font-weight:600;">
            <mat-spinner *ngIf="loading" diameter="20" style="display:inline-block; margin-right:8px;"></mat-spinner>
            {{ loading ? 'Resetting...' : 'Reset Password' }}
          </button>
        </form>
      </div>
      <div *ngIf="success" style="text-align:center; padding:20px 0;">
        <div style="font-size:56px; margin-bottom:16px;">✅</div>
        <h3 style="color:#2e7d32; margin-bottom:8px;">Password Reset!</h3>
        <p style="color:#616161; margin-bottom:20px;">Your password has been changed successfully.</p>
        <a routerLink="/auth/login" mat-raised-button color="primary">Go to Login</a>
      </div>
    </div>
  </div>
</div>
