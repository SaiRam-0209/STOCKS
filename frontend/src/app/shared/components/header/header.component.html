<header class="topbar">
  <button mat-icon-button (click)="menuToggle.emit()" class="menu-btn">
    <mat-icon>menu</mat-icon>
  </button>

  <span class="topbar__title">{{ title }}</span>

  <div class="topbar__actions">
    <!-- Notifications -->
    <button mat-icon-button [matMenuTriggerFor]="notifMenu"
            [matBadge]="unreadCount > 0 ? unreadCount : null"
            matBadgeColor="warn"
            matBadgeSize="small"
            class="notif-btn">
      <mat-icon>notifications</mat-icon>
    </button>

    <mat-menu #notifMenu="matMenu" class="notification-menu" xPosition="before">
      <div class="notification-panel" (click)="$event.stopPropagation()">
        <div class="notification-panel__header">
          <span style="font-weight:600; font-size:15px;">Notifications</span>
          <button mat-button color="primary" (click)="markAllRead()" style="font-size:12px;">
            Mark all read
          </button>
        </div>

        <div *ngIf="notifications.length === 0" style="padding:32px; text-align:center; color:#9e9e9e;">
          <mat-icon style="font-size:40px; width:40px; height:40px; display:block; margin:0 auto 8px;">
            notifications_none
          </mat-icon>
          No notifications
        </div>

        <div *ngFor="let n of notifications"
             class="notification-panel__item"
             [class.unread]="!n.isRead"
             (click)="onNotificationClick(n)">
          <div style="display:flex; gap:12px; align-items:flex-start;">
            <div style="width:36px; height:36px; border-radius:50%; background:#e8eaf6;
                        display:flex; align-items:center; justify-content:center; flex-shrink:0;">
              <mat-icon style="font-size:18px; width:18px; height:18px; color:#3949ab;">
                {{ getNotificationIcon(n.type) }}
              </mat-icon>
            </div>
            <div style="flex:1; min-width:0;">
              <div class="notification-panel__item-title">{{ n.title }}</div>
              <div class="notification-panel__item-message">{{ n.message }}</div>
              <div class="notification-panel__item-time">{{ formatTime(n.createdAt) }}</div>
            </div>
            <div *ngIf="!n.isRead" style="width:8px; height:8px; border-radius:50%;
                 background:#3949ab; flex-shrink:0; margin-top:4px;"></div>
          </div>
        </div>
      </div>
    </mat-menu>

    <!-- User Avatar -->
    <div style="width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#3949ab,#1a237e);
                display:flex; align-items:center; justify-content:center; color:white;
                font-weight:700; font-size:13px; cursor:pointer; margin-left:8px;">
      {{ (authService?.getCurrentUser()?.name || 'U').charAt(0).toUpperCase() }}
    </div>
  </div>
</header>
